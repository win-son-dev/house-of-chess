services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: houseofchess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d houseofchess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api1:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment: &api-env
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=houseofchess;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__Redis: redis:6379
      Auth0__Domain: ${AUTH0_DOMAIN}
      Auth0__Audience: ${AUTH0_AUDIENCE}
      Cors__AllowedOrigins__0: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api2:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      <<: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN}
        VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
        VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      - api1
      - api2

volumes:
  postgres-data:
